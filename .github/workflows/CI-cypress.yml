name: CI-Cypress
env:
  CI: true
  FORCE_COLOR: 1

on:
  push:
    branches:
      - feat/CI
  pull_request:
    branches:
      - main

jobs:
  cypress:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cypress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_mysql
          coverage: none

      - name: Setup Composer
        run: composer self-update

      - name: Setup Symfony CLI
        run: curl -1sLf 'https://dl.cloudsmith.io/public/symfony/stable/setup.deb.sh' | sudo -E bash && sudo apt install symfony-cli

      - name: Install back-end dependencies
        working-directory: ./back
        run: composer install --no-progress --no-interaction

      - name: Install TLS
        working-directory: ./back
        run: symfony server:ca:install

      - name: Set up .env.test file
        working-directory: ./back
        run: cp .env .env.test

      - name: Generate JWT token
        working-directory: ./back
        run: php bin/console lexik:jwt:generate-keypair

      - name: Run database migrations and load fixtures
        working-directory: ./back
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:schema:update --force --no-interaction
          php bin/console doctrine:fixtures:load --no-interaction


      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install front-end dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set environment variables
        run: echo "VITE_BASE_URL=https://127.0.0.1:8000" >> $GITHUB_ENV

      - name: run servers
        run: make start-back &

      - name: Wait for Symfony server
        run: |
          until curl -sk https://127.0.0.1:8000 > /dev/null; do
            echo "Waiting for Symfony server..."
            sleep 1
          done

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          # Utilise la commande dev du monorepo qui lance les bundles sur les ports 3000, 3001, 3003
          start: pnpm run dev
          wait-on: 'http://localhost:3000'
          record: false
          parallel: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload Cypress artifacts (optional)
      - name: Upload Cypress Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results
          path: cypress/reports

      - name: Stop Symfony server
        run: symfony server:stop
