name: CI-Packages

on:
  push:
    branches: [main]
    paths:
    - 'packages/**'
    - 'shared/**'
    - 'package.json'
    - 'pnpm-workspace.yaml'
  pull_request:
    branches: [main]
    paths:
    - 'packages/**'
    - 'shared/**'
    - 'package.json'
    - 'pnpm-workspace.yaml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Run builds
      run: pnpm run build --if-present

    - name: Run tests
      run: pnpm run test --if-present
