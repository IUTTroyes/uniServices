name: CI-Back

on:
  push:
    branches: [main]
    paths:
      - 'back/**'
  pull_request:
    branches: [main]
    paths:
      - 'back/**'

jobs:
  test-back:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: symfony_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, intl, pdo_mysql, iconv, simplexml
        coverage: none

    - name: Install dependencies
      working-directory: ./back
      run: composer install --no-progress --no-interaction --prefer-dist

    - name: Set up .env.test file
      working-directory: ./back
      run: |
        if [ -f .env.test ]; then
          echo "Using existing .env.test"
        else
          cp .env .env.test || echo "DATABASE_URL=mysql://root:root@127.0.0.1:3306/symfony_test" > .env.test
        fi

    - name: Database setup
      working-directory: ./back
      env:
        DATABASE_URL: 'mysql://root:root@127.0.0.1:3306/symfony_test'
      run: |
        php bin/console doctrine:database:create --if-not-exists --no-interaction
        php bin/console doctrine:migrations:migrate --no-interaction

    - name: Run PHPStan
      working-directory: ./back
      run: make phpstan

    - name: Run PHPUnit
      working-directory: ./back
      run: |
        if [ -f vendor/bin/phpunit ]; then
          vendor/bin/phpunit
        else
          echo "No PHPUnit found or no tests."
        fi
