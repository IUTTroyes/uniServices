services:
  php:
    image: cyndel/uniservices:${APP_VERSION:-latest}
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - symfony_logs:/var/www/html/back/var/log

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      php:
        condition: service_healthy

volumes:
  symfony_logs:
  nginx_logs:
