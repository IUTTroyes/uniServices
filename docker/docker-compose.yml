services:
  php:
    build:
      context: ..
      dockerfile: Dockerfile
      target: production
    container_name: uniservices-php-dev
    hostname: uniservices-php-dev
    restart: unless-stopped
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}?serverVersion=10.8-MariaDB&charset=utf8mb4"
      MAILER_DSN: "smtp://maildev:1025"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../back:/var/www/html/back
      - ../packages:/var/www/html/packages
      - ../shared:/var/www/html/shared
    networks:
      - uniservices_net

  nginx:
    image: nginx:1.25-alpine
    container_name: uniservices-nginx-dev
    hostname: uniservices-nginx-dev
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - php
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../back/public:/var/www/html/back/public:ro
    networks:
      - uniservices_net

  db:
    image: mariadb:10.8
    container_name: uniservice-db
    hostname: uniservice-db
    restart: unless-stopped
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db-volume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - uniservices_net
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: uniservice-adminsql
    hostname: uniservice-adminsql
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - uniservices_net

  maildev:
    image: maildev/maildev
    container_name: uniservice-mail
    hostname: uniservice-mail
    command: bin/maildev --web 1080 --smtp 1025 --hide-extensions STARTTLS
    restart: unless-stopped
    ports:
      - "${MAILDEV_PORT}:1080"
    networks:
      - uniservices_net

volumes:
  db-volume:

networks:
  uniservices_net:
    driver: bridge
