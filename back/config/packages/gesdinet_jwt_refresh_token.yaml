gesdinet_jwt_refresh_token:
    refresh_token_class: App\Entity\RefreshToken
    ttl: 1209600 # 14 jours (14 * 24 * 60 * 60)
    user_identity_field: username
    single_use: true # Rotation : nouveau token à chaque refresh pour plus de sécurité
    cookie:
        enabled: true
        same_site: lax
        path: /
        domain: null
        http_only: true
        secure: '%env(bool:JWT_COOKIE_SECURE)%' # Mettre true en production avec HTTPS
        remove_token_from_body: true


